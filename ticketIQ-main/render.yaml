services:
  - type: web
    name: ticketiq-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: ticketIQ-main/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ticketiq-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: APP_ENV
        value: production
      - key: CORS_ORIGINS
        value: https://your-frontend.vercel.app

databases:
  - name: ticketiq-db
    plan: free
    region: oregon