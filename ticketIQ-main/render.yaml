services:
  - type: web
    name: ticketiq-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: ticketIQ-main/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: ticketiq-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: APP_ENV
        value: production
      - key: CORS_ORIGINS
        fromService:
          type: web
          name: ticketiq-frontend
          property: host

  - type: web
    name: ticketiq-frontend
    runtime: node
    region: oregon
    plan: free
    rootDir: ticketIQ-main/frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: ticketiq-backend
          property: host

databases:
  - name: ticketiq-db
    plan: free
    region: oregon